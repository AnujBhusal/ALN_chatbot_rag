# Fly.io Configuration for ALN Chatbot RAG

app = "aln-chatbot-rag"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"
  API_PORT = "8000"
  API_HOST = "0.0.0.0"
  EMBEDDING_MODEL = "sentence-transformers/all-MiniLM-L6-v2"
  USE_GROQ = "true"
  GROQ_MODEL = "mixtral-8x7b-32768"
  USE_OLLAMA = "false"
  USE_HF = "false"

# Services
[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
    force_https = true

# Health Checks
[checks]
  [checks.http_check]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    path = "/docs"
    protocol = "http"
    timeout = "5s"
    type = "http"

# Restart Policy
[deploy]
  release_command = "echo 'Deployment starting...'"
  strategy = "rolling"

# VM Resources (free tier compatible)
[[vm]]
  cpus = 1
  memory_mb = 512
  processes = ["app"]
